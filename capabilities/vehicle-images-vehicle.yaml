naftiko: 1.0.0-alpha2
info:
  label: Mercedes-Benz Vehicle Images API — Vehicle
  description: 'Mercedes-Benz Vehicle Images API — Vehicle. Retrieve exterior and interior vehicle images keyed by
    FIN/VIN with perspective and day/night modifiers. Self-contained Naftiko capability.'
  tags:
  - Mercedes-Benz
  - Vehicle Images
  - Imagery
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MERCEDES_BENZ_API_KEY: MERCEDES_BENZ_API_KEY
capability:
  consumes:
  - type: http
    namespace: vehicle-images-vehicle
    baseUri: https://api.mercedes-benz.com
    description: Mercedes-Benz Vehicle Images — full vehicle exterior/interior images by VIN/FIN.
    resources:
    - name: vehicle-image
      path: /vehicle_images/v1/vehicles/{finorvin}/vehicle
      operations:
      - name: getvehicleimage
        method: GET
        description: Get exterior/interior vehicle image by FIN/VIN.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.MERCEDES_BENZ_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: vehicle-images-vehicle-rest
    port: 8080
    description: REST adapter for vehicle image retrieval by VIN/FIN.
    resources:
    - path: /v1/vehicles/{finorvin}/vehicle
      name: vehicle-image
      description: REST surface for vehicle image by VIN/FIN.
      operations:
      - method: GET
        name: getvehicleimage
        description: Get Vehicle Image By VIN
        call: vehicle-images-vehicle.getvehicleimage
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: vehicle-images-vehicle-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing Mercedes-Benz vehicle image lookup as a read-only tool.
    tools:
    - name: mercedes-get-vehicle-image
      description: Get a Mercedes-Benz vehicle's exterior or interior image by VIN/FIN.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: vehicle-images-vehicle.getvehicleimage
      outputParameters:
      - type: object
        mapping: $.
