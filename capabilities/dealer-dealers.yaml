naftiko: 1.0.0-alpha2
info:
  label: Mercedes-Benz Dealer API — Dealers
  description: 'Mercedes-Benz Dealer API — Dealers. List countries supported by the dealer locator, list dealers
    matching geo and service filters, and fetch a single dealer by id. Self-contained Naftiko capability.'
  tags:
  - Mercedes-Benz
  - Dealer
  - Locator
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    MERCEDES_BENZ_API_KEY: MERCEDES_BENZ_API_KEY
capability:
  consumes:
  - type: http
    namespace: dealer-dealers
    baseUri: https://api.mercedes-benz.com
    description: Mercedes-Benz dealer locator — supported countries and dealer search by geo/service filters.
    resources:
    - name: countries
      path: /dealer/v1/countries
      operations:
      - name: listcountries
        method: GET
        description: List countries supported by the dealer locator.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: dealers
      path: /dealer/v1/dealers
      operations:
      - name: listdealers
        method: GET
        description: List dealers matching country, geo, and service filters.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: array
          value: $.
    - name: dealer
      path: /dealer/v1/dealers/{dealerId}
      operations:
      - name: getdealer
        method: GET
        description: Get a specific dealer by id.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: apikey
      value: '{{env.MERCEDES_BENZ_API_KEY}}'
      placement: query
  exposes:
  - type: rest
    namespace: dealer-dealers-rest
    port: 8080
    description: REST adapter for Mercedes-Benz dealer locator.
    resources:
    - path: /v1/countries
      name: countries
      description: REST surface for supported countries.
      operations:
      - method: GET
        name: listcountries
        description: List Countries Supported By Dealer Locator
        call: dealer-dealers.listcountries
        outputParameters:
        - type: array
          mapping: $.
    - path: /v1/dealers
      name: dealers
      description: REST surface for dealer search.
      operations:
      - method: GET
        name: listdealers
        description: Search Mercedes-Benz Dealers
        call: dealer-dealers.listdealers
        outputParameters:
        - type: array
          mapping: $.
    - path: /v1/dealers/{dealer-id}
      name: dealer
      description: REST surface for single dealer.
      operations:
      - method: GET
        name: getdealer
        description: Get Mercedes-Benz Dealer By ID
        call: dealer-dealers.getdealer
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dealer-dealers-mcp
    port: 9090
    transport: http
    description: MCP adapter exposing Mercedes-Benz dealer locator as read-only tools.
    tools:
    - name: mercedes-list-dealer-countries
      description: List countries supported by the Mercedes-Benz dealer locator.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dealer-dealers.listcountries
      outputParameters:
      - type: array
        mapping: $.
    - name: mercedes-search-dealers
      description: Search Mercedes-Benz dealers by country and geo radius.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dealer-dealers.listdealers
      outputParameters:
      - type: array
        mapping: $.
    - name: mercedes-get-dealer
      description: Get a single Mercedes-Benz dealer by id.
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dealer-dealers.getdealer
      outputParameters:
      - type: object
        mapping: $.
